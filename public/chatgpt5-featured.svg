<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b0b14"/>
      <stop offset="30%" stop-color="#111128"/>
      <stop offset="70%" stop-color="#0f1628"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0b0b14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0b0b14" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#6366f1" flood-opacity="0.2"/>
    </filter>
    <filter id="badgeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" rx="0"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#centerGlow)"/>
  <rect width="1200" height="630" fill="url(#leftGlow)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="157" x2="1200" y2="157" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="0" y1="472" x2="1200" y2="472" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#6366f1" stroke-width="0.5"/>
  </g>

  <!-- Floating particles -->
  <circle cx="180" cy="100" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="1050" cy="80" r="1.5" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="1100" cy="500" r="2.5" fill="#a78bfa" opacity="0.25"/>
  <circle cx="150" cy="480" r="1.5" fill="#6366f1" opacity="0.35"/>
  <circle cx="550" cy="60" r="1" fill="#c7d2fe" opacity="0.25"/>
  <circle cx="780" cy="560" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="400" cy="540" r="1" fill="#6366f1" opacity="0.4"/>
  <circle cx="920" cy="200" r="1.5" fill="#a78bfa" opacity="0.3"/>

  <!-- Decorative arcs -->
  <circle cx="100" cy="500" r="80" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.1"/>
  <circle cx="100" cy="500" r="120" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.06"/>
  <circle cx="1100" cy="150" r="100" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.08"/>

  <!-- ======================================== -->
  <!-- LEFT SIDE: ChatGPT Interface Mockup      -->
  <!-- ======================================== -->
  <g filter="url(#cardShadow)" transform="translate(80, 100)">
    <rect x="0" y="0" width="500" height="340" rx="16" fill="#0a0a16" stroke="#1e1e3a" stroke-width="1"/>

    <!-- Window bar -->
    <rect x="0" y="0" width="500" height="40" rx="16" fill="#101022"/>
    <rect x="0" y="24" width="500" height="16" fill="#101022"/>
    <circle cx="20" cy="20" r="6" fill="#f87171" opacity="0.8"/>
    <circle cx="40" cy="20" r="6" fill="#fbbf24" opacity="0.8"/>
    <circle cx="60" cy="20" r="6" fill="#34d399" opacity="0.8"/>
    <rect x="200" y="16" width="100" height="8" rx="4" fill="#6366f1" opacity="0.4"/>

    <!-- Chat area -->
    <!-- User message -->
    <rect x="300" y="60" width="180" height="34" rx="17" fill="#6366f1" opacity="0.85"/>
    <text x="390" y="82" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" font-weight="500">Explica qué es GPT-5</text>

    <!-- AI response -->
    <rect x="20" y="60" width="40" height="40" rx="20" fill="url(#accentGrad)" opacity="0.8"/>
    <text x="40" y="86" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" font-weight="bold">AI</text>

    <!-- Response lines -->
    <rect x="20" y="115" width="460" height="12" rx="6" fill="rgba(255,255,255,0.12)"/>
    <rect x="20" y="135" width="430" height="12" rx="6" fill="rgba(255,255,255,0.1)"/>
    <rect x="20" y="155" width="400" height="12" rx="6" fill="rgba(255,255,255,0.1)"/>
    <rect x="20" y="175" width="350" height="12" rx="6" fill="rgba(255,255,255,0.08)"/>

    <!-- Second exchange -->
    <rect x="260" y="210" width="220" height="34" rx="17" fill="#6366f1" opacity="0.7"/>
    <text x="370" y="232" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" font-weight="500">¿Qué mejoras tiene?</text>

    <rect x="20" y="258" width="460" height="12" rx="6" fill="rgba(255,255,255,0.12)"/>
    <rect x="20" y="278" width="380" height="12" rx="6" fill="rgba(255,255,255,0.1)"/>
    <rect x="20" y="298" width="200" height="12" rx="6" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- Neural network icon (floating left) -->
  <g transform="translate(640, 130)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.1"/>

    <!-- Nodes -->
    <circle cx="-15" cy="-18" r="5" fill="#6366f1" opacity="0.8"/>
    <circle cx="18" cy="-10" r="5" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="8" cy="20" r="5" fill="#a78bfa" opacity="0.8"/>
    <circle cx="-18" cy="12" r="4" fill="#6366f1" opacity="0.6"/>
    <circle cx="0" cy="0" r="6" fill="#c7d2fe" opacity="0.9"/>

    <!-- Connections -->
    <line x1="-15" y1="-18" x2="0" y2="0" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <line x1="18" y1="-10" x2="0" y2="0" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
    <line x1="8" y1="20" x2="0" y2="0" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
    <line x1="-18" y1="12" x2="0" y2="0" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="-15" y1="-18" x2="18" y2="-10" stroke="#6366f1" stroke-width="0.8" opacity="0.2"/>
    <line x1="18" y1="-10" x2="8" y2="20" stroke="#8b5cf6" stroke-width="0.8" opacity="0.2"/>
    <line x1="8" y1="20" x2="-18" y2="12" stroke="#a78bfa" stroke-width="0.8" opacity="0.2"/>
  </g>

  <!-- Feature badges (right side) -->
  <g filter="url(#badgeGlow)">
    <g transform="translate(780, 90)">
      <rect x="0" y="0" width="350" height="48" rx="24" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1" opacity="0.85"/>
      <rect x="16" y="16" width="16" height="16" rx="8" fill="#6366f1" opacity="0.3"/>
      <text x="24" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6366f1" font-weight="700">5</text>
      <text x="44" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e0e7ff" font-weight="500">Razonamiento 3x más preciso que GPT-4</text>
    </g>

    <g transform="translate(780, 150)">
      <rect x="0" y="0" width="350" height="48" rx="24" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1" opacity="0.85"/>
      <rect x="16" y="16" width="16" height="16" rx="8" fill="#8b5cf6" opacity="0.3"/>
      <text x="24" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b5cf6" font-weight="700">200K</text>
      <text x="44" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e0e7ff" font-weight="500">Ventana de contexto de 200K tokens</text>
    </g>

    <g transform="translate(780, 210)">
      <rect x="0" y="0" width="350" height="48" rx="24" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1" opacity="0.85"/>
      <rect x="16" y="16" width="16" height="16" rx="8" fill="#a78bfa" opacity="0.3"/>
      <text x="24" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a78bfa" font-weight="700">M</text>
      <text x="44" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e0e7ff" font-weight="500">Multimodal: texto, imagen, audio, video</text>
    </g>

    <g transform="translate(780, 270)">
      <rect x="0" y="0" width="350" height="48" rx="24" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="1" opacity="0.85"/>
      <rect x="16" y="16" width="16" height="16" rx="8" fill="#6366f1" opacity="0.3"/>
      <text x="24" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6366f1" font-weight="700">&#9889;</text>
      <text x="44" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e0e7ff" font-weight="500">Respuestas 60% más rápidas</text>
    </g>
  </g>

  <!-- ======================================== -->
  <!-- BOTTOM: Title and brand bar              -->
  <!-- ======================================== -->

  <!-- Bottom gradient overlay -->
  <rect x="0" y="480" width="1200" height="150" fill="url(#bgGrad)"/>

  <!-- Gradient line separator -->
  <rect x="200" y="475" width="800" height="2" rx="1" fill="url(#accentGrad)" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#textGrad)" letter-spacing="-0.02em">ChatGPT-5: Guía Completa</text>

  <!-- Subtitle -->
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a1a1aa" font-weight="400">Novedades, comparativas y cómo sacarle el máximo provecho</text>

  <!-- Brand -->
  <g transform="translate(555, 588)">
    <rect x="0" y="0" width="24" height="24" rx="6" fill="url(#accentGrad)"/>
    <text x="12" y="17" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" font-weight="bold">AI</text>
    <text x="32" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#71717a" font-weight="500">IATools</text>
  </g>
</svg>
