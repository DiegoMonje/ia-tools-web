<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Sound waves -->
  <circle cx="400" cy="180" r="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <circle cx="400" cy="180" r="60" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <circle cx="400" cy="180" r="40" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <circle cx="400" cy="180" r="20" fill="rgba(255,255,255,0.3)"/>
  <!-- Waveform -->
  <rect x="200" y="170" width="8" height="20" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="215" y="160" width="8" height="40" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="230" y="150" width="8" height="60" rx="4" fill="rgba(255,255,255,0.6)"/>
  <rect x="245" y="140" width="8" height="80" rx="4" fill="rgba(255,255,255,0.7)"/>
  <rect x="260" y="155" width="8" height="50" rx="4" fill="rgba(255,255,255,0.6)"/>
  <rect x="275" y="165" width="8" height="30" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="290" y="175" width="8" height="10" rx="4" fill="rgba(255,255,255,0.4)"/>
  <!-- Right side waveform -->
  <rect x="500" y="170" width="8" height="20" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="515" y="160" width="8" height="40" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="530" y="145" width="8" height="70" rx="4" fill="rgba(255,255,255,0.6)"/>
  <rect x="545" y="135" width="8" height="90" rx="4" fill="rgba(255,255,255,0.7)"/>
  <rect x="560" y="150" width="8" height="60" rx="4" fill="rgba(255,255,255,0.6)"/>
  <rect x="575" y="165" width="8" height="30" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="590" y="175" width="8" height="10" rx="4" fill="rgba(255,255,255,0.4)"/>
  <!-- Labels -->
  <text x="250" y="340" text-anchor="middle" fill="rgba(0,0,0,0.7)" font-family="Arial" font-size="18" font-weight="bold">ElevenLabs</text>
  <text x="550" y="340" text-anchor="middle" fill="rgba(0,0,0,0.7)" font-family="Arial" font-size="18" font-weight="bold">PlayHT</text>
</svg>
