<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="40%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0.5" y1="0.5" x2="0.5" y2="0.0001" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0f0f1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="800" height="400" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="0"/>

  <!-- Ambient glow -->
  <rect width="800" height="400" fill="url(#centerGlow)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#6366f1" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#6366f1" stroke-width="0.5"/>
  </g>

  <!-- Floating particles -->
  <circle cx="120" cy="80" r="2" fill="#6366f1" opacity="0.5"/>
  <circle cx="680" cy="60" r="1.5" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="720" cy="320" r="2.5" fill="#a78bfa" opacity="0.3"/>
  <circle cx="100" cy="310" r="1.5" fill="#6366f1" opacity="0.4"/>
  <circle cx="350" cy="50" r="1" fill="#c7d2fe" opacity="0.3"/>
  <circle cx="500" cy="360" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="250" cy="350" r="1" fill="#6366f1" opacity="0.5"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="300" r="60" fill="#6366f1" opacity="0.05"/>
  <circle cx="650" cy="80" r="80" fill="#8b5cf6" opacity="0.04"/>
  <circle cx="500" cy="350" r="40" fill="#a78bfa" opacity="0.06"/>

  <!-- Central chat interface card -->
  <g filter="url(#shadow)">
    <rect x="230" y="60" width="340" height="230" rx="16" fill="#0d0d1a" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.9"/>
  </g>

  <!-- Chat interface header -->
  <rect x="230" y="60" width="340" height="36" rx="16" fill="#13132b"/>
  <rect x="230" y="80" width="340" height="16" fill="#13132b"/>
  <!-- Window dots -->
  <circle cx="250" cy="78" r="5" fill="#f87171" opacity="0.8"/>
  <circle cx="268" cy="78" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="286" cy="78" r="5" fill="#34d399" opacity="0.8"/>
  <!-- Header title -->
  <rect x="360" y="74" width="80" height="8" rx="4" fill="#6366f1" opacity="0.6"/>

  <!-- User message bubble -->
  <rect x="440" y="108" width="118" height="28" rx="14" fill="#6366f1" opacity="0.9"/>
  <text x="499" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" font-weight="500">¿Qué es ChatGPT-5?</text>

  <!-- AI response lines -->
  <rect x="250" y="148" width="240" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
  <rect x="250" y="166" width="300" height="10" rx="5" fill="rgba(255,255,255,0.12)"/>
  <rect x="250" y="184" width="260" height="10" rx="5" fill="rgba(255,255,255,0.12)"/>
  <rect x="250" y="202" width="180" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>

  <!-- Typing indicator -->
  <circle cx="260" cy="234" r="4" fill="#6366f1" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="274" cy="234" r="4" fill="#8b5cf6" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="288" cy="234" r="4" fill="#a78bfa" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Sparkle / AI brain icon on the left -->
  <g transform="translate(140, 140)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <!-- Neural network dots -->
    <circle cx="-8" cy="-10" r="3" fill="#6366f1" opacity="0.8"/>
    <circle cx="10" cy="-5" r="3" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="5" cy="12" r="3" fill="#a78bfa" opacity="0.8"/>
    <circle cx="-10" cy="8" r="2.5" fill="#6366f1" opacity="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#c7d2fe" opacity="0.9"/>
    <!-- Connections -->
    <line x1="-8" y1="-10" x2="0" y2="0" stroke="#6366f1" stroke-width="0.8" opacity="0.5"/>
    <line x1="10" y1="-5" x2="0" y2="0" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
    <line x1="5" y1="12" x2="0" y2="0" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>
    <line x1="-10" y1="8" x2="0" y2="0" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
    <line x1="-8" y1="-10" x2="10" y2="-5" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
    <line x1="10" y1="-5" x2="5" y2="12" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Feature badges on the right -->
  <g transform="translate(620, 100)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#13132b" stroke="#6366f1" stroke-width="0.8" opacity="0.8"/>
    <circle cx="16" cy="16" r="6" fill="#6366f1" opacity="0.3"/>
    <text x="32" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c7d2fe" font-weight="500">200K tokens</text>
  </g>
  <g transform="translate(620, 145)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#13132b" stroke="#8b5cf6" stroke-width="0.8" opacity="0.8"/>
    <circle cx="16" cy="16" r="6" fill="#8b5cf6" opacity="0.3"/>
    <text x="32" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c7d2fe" font-weight="500">Multimodal</text>
  </g>
  <g transform="translate(620, 190)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#13132b" stroke="#a78bfa" stroke-width="0.8" opacity="0.8"/>
    <circle cx="16" cy="16" r="6" fill="#a78bfa" opacity="0.3"/>
    <text x="32" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c7d2fe" font-weight="500">+60% rápido</text>
  </g>
  <g transform="translate(620, 235)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#13132b" stroke="#6366f1" stroke-width="0.8" opacity="0.8"/>
    <circle cx="16" cy="16" r="6" fill="#6366f1" opacity="0.3"/>
    <text x="32" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c7d2fe" font-weight="500">Razonamiento</text>
  </g>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="310" width="800" height="90" fill="url(#bgGrad)" opacity="0.7"/>

  <!-- Title text -->
  <text x="400" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="white" letter-spacing="-0.02em">ChatGPT-5</text>
  <text x="400" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa" font-weight="500" letter-spacing="0.02em">Guía Completa  •  Análisis  •  Novedades</text>
</svg>
