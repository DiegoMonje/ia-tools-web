<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="mjGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#c44569"/>
    </linearGradient>
    <linearGradient id="dalleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="vsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="50%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="100" y="80" width="380" height="420" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Background glows -->
  <circle cx="300" cy="300" r="300" fill="rgba(255,107,157,0.08)" filter="url(#blur2)"/>
  <circle cx="900" cy="300" r="300" fill="rgba(79,172,254,0.08)" filter="url(#blur2)"/>
  
  <!-- Grid dots -->
  <g opacity="0.04" fill="white">
    <circle cx="100" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/><circle cx="400" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/>
    <circle cx="700" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/><circle cx="1000" cy="100" r="1.5"/><circle cx="1100" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/><circle cx="400" cy="200" r="1.5"/><circle cx="500" cy="200" r="1.5"/>
    <circle cx="700" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="900" cy="200" r="1.5"/><circle cx="1000" cy="200" r="1.5"/><circle cx="1100" cy="200" r="1.5"/>
    <circle cx="100" cy="500" r="1.5"/><circle cx="200" cy="500" r="1.5"/><circle cx="300" cy="500" r="1.5"/><circle cx="400" cy="500" r="1.5"/><circle cx="500" cy="500" r="1.5"/>
    <circle cx="700" cy="500" r="1.5"/><circle cx="800" cy="500" r="1.5"/><circle cx="900" cy="500" r="1.5"/><circle cx="1000" cy="500" r="1.5"/><circle cx="1100" cy="500" r="1.5"/>
    <circle cx="100" cy="600" r="1.5"/><circle cx="200" cy="600" r="1.5"/><circle cx="300" cy="600" r="1.5"/><circle cx="400" cy="600" r="1.5"/><circle cx="500" cy="600" r="1.5"/>
    <circle cx="700" cy="600" r="1.5"/><circle cx="800" cy="600" r="1.5"/><circle cx="900" cy="600" r="1.5"/><circle cx="1000" cy="600" r="1.5"/><circle cx="1100" cy="600" r="1.5"/>
  </g>

  <!-- LEFT CARD - Midjourney -->
  <rect x="100" y="80" width="380" height="420" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,107,157,0.2)" stroke-width="1.5" filter="url(#shadow)"/>
  
  <!-- MJ Card inner content -->
  <g transform="translate(290, 200)">
    <!-- Abstract art representation -->
    <circle cx="0" cy="0" r="60" fill="url(#mjGrad)" opacity="0.3"/>
    <ellipse cx="-20" cy="-30" rx="40" ry="25" fill="rgba(255,107,157,0.2)" transform="rotate(30)"/>
    <ellipse cx="25" cy="20" rx="30" ry="35" fill="rgba(196,69,105,0.15)" transform="rotate(-20)"/>
    <circle cx="-30" cy="40" r="20" fill="rgba(255,107,157,0.15)"/>
    <circle cx="35" cy="-35" r="15" fill="rgba(196,69,105,0.2)"/>
    <path d="M-40,-50 Q0,-80 40,-50 Q50,-20 40,10 Q0,30 -40,10 Q-50,-20 -40,-50Z" fill="rgba(255,107,157,0.1)" stroke="rgba(255,107,157,0.3)" stroke-width="1"/>
  </g>
  
  <!-- MJ label -->
  <text x="290" y="440" text-anchor="middle" fill="#ff6b9d" font-family="Arial, sans-serif" font-size="32" font-weight="bold" letter-spacing="2">MIDJOURNEY</text>
  <text x="290" y="465" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="16">v7</text>

  <!-- RIGHT CARD - DALL-E -->
  <rect x="720" y="80" width="380" height="420" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(79,172,254,0.2)" stroke-width="1.5" filter="url(#shadow)"/>
  
  <!-- DALL-E Card inner content -->
  <g transform="translate(910, 200)">
    <!-- Geometric art representation -->
    <rect x="-40" y="-40" width="80" height="80" rx="8" fill="url(#dalleGrad)" opacity="0.2" transform="rotate(45)"/>
    <rect x="-30" y="-30" width="60" height="60" rx="6" fill="rgba(79,172,254,0.15)" transform="rotate(15)"/>
    <circle cx="0" cy="0" r="25" fill="rgba(0,242,254,0.15)"/>
    <polygon points="0,-50 40,20 -40,20" fill="rgba(79,172,254,0.12)" stroke="rgba(79,172,254,0.25)" stroke-width="1"/>
    <circle cx="-35" cy="30" r="12" fill="rgba(0,242,254,0.15)"/>
    <circle cx="35" cy="-25" r="10" fill="rgba(79,172,254,0.15)"/>
    <path d="M-50,30 Q0,60 50,30" fill="none" stroke="rgba(0,242,254,0.25)" stroke-width="2"/>
  </g>
  
  <!-- DALL-E label -->
  <text x="910" y="440" text-anchor="middle" fill="#4facfe" font-family="Arial, sans-serif" font-size="36" font-weight="bold" letter-spacing="2">DALL-E</text>
  <text x="910" y="465" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="16">4</text>

  <!-- VS Badge -->
  <g transform="translate(600, 290)">
    <circle cx="0" cy="0" r="50" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#vsGrad)" stroke-width="2"/>
    <text x="0" y="12" text-anchor="middle" fill="url(#vsGrad)" font-family="Arial, sans-serif" font-size="28" font-weight="bold">VS</text>
  </g>

  <!-- Top title -->
  <text x="600" y="50" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="300" letter-spacing="6">COMPARATIVA</text>

  <!-- Bottom text -->
  <text x="600" y="560" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="1">¿Cuál genera mejores imágenes?</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="610" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="2">IA TOOLS</text>
  <text x="600" y="610" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="12">Análisis • Comparativas • Tutoriales</text>
  <text x="1140" y="610" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="14" font-weight="500">2026</text>
</svg>
