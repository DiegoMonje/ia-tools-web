<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.6"/>
      <stop offset="30%" style="stop-color:#f97316;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#f472b6;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#8b5cf6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Background glows -->
  <circle cx="200" cy="300" r="200" fill="rgba(249,115,22,0.06)" filter="url(#blur1)"/>
  <circle cx="600" cy="200" r="250" fill="rgba(244,114,182,0.06)" filter="url(#blur1)"/>
  <circle cx="1000" cy="300" r="200" fill="rgba(59,130,246,0.06)" filter="url(#blur1)"/>

  <!-- Audio waveform visualization - Main element -->
  <g transform="translate(0, 280)" filter="url(#glow)">
    <!-- Wave bars -->
    <rect x="100" y="-30" width="6" height="60" rx="3" fill="url(#waveGrad)" opacity="0.3"/>
    <rect x="120" y="-45" width="6" height="90" rx="3" fill="url(#waveGrad)" opacity="0.4"/>
    <rect x="140" y="-60" width="6" height="120" rx="3" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="160" y="-80" width="6" height="160" rx="3" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="180" y="-55" width="6" height="110" rx="3" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="200" y="-35" width="6" height="70" rx="3" fill="url(#waveGrad)" opacity="0.4"/>
    <rect x="220" y="-50" width="6" height="100" rx="3" fill="url(#waveGrad)" opacity="0.45"/>
    <rect x="240" y="-70" width="6" height="140" rx="3" fill="url(#waveGrad)" opacity="0.55"/>
    <rect x="260" y="-90" width="6" height="180" rx="3" fill="url(#waveGrad)" opacity="0.7"/>
    <rect x="280" y="-110" width="6" height="220" rx="3" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="300" y="-95" width="6" height="190" rx="3" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="320" y="-75" width="6" height="150" rx="3" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="340" y="-55" width="6" height="110" rx="3" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="360" y="-40" width="6" height="80" rx="3" fill="url(#waveGrad)" opacity="0.4"/>
    <rect x="380" y="-65" width="6" height="130" rx="3" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="400" y="-85" width="6" height="170" rx="3" fill="url(#waveGrad)" opacity="0.65"/>
    <rect x="420" y="-100" width="6" height="200" rx="3" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="440" y="-120" width="6" height="240" rx="3" fill="url(#waveGrad)" opacity="0.9"/>
    <rect x="460" y="-100" width="6" height="200" rx="3" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="480" y="-80" width="6" height="160" rx="3" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="500" y="-60" width="6" height="120" rx="3" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="520" y="-45" width="6" height="90" rx="3" fill="url(#waveGrad)" opacity="0.4"/>
    <rect x="540" y="-70" width="6" height="140" rx="3" fill="url(#waveGrad)" opacity="0.55"/>
    <rect x="560" y="-95" width="6" height="190" rx="3" fill="url(#waveGrad)" opacity="0.7"/>
    <rect x="580" y="-115" width="6" height="230" rx="3" fill="url(#waveGrad)" opacity="0.85"/>
    <rect x="600" y="-100" width="6" height="200" rx="3" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="620" y="-75" width="6" height="150" rx="3" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="640" y="-50" width="6" height="100" rx="3" fill="url(#waveGrad)" opacity="0.45"/>
    <rect x="660" y="-70" width="6" height="140" rx="3" fill="url(#waveGrad)" opacity="0.55"/>
    <rect x="680" y="-90" width="6" height="180" rx="3" fill="url(#waveGrad)" opacity="0.65"/>
    <rect x="700" y="-110" width="6" height="220" rx="3" fill="url(#waveGrad)" opacity="0.8"/>
    <rect x="720" y="-95" width="6" height="190" rx="3" fill="url(#waveGrad)" opacity="0.7"/>
    <rect x="740" y="-75" width="6" height="150" rx="3" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="760" y="-55" width="6" height="110" rx="3" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="780" y="-40" width="6" height="80" rx="3" fill="url(#waveGrad)" opacity="0.4"/>
    <rect x="800" y="-60" width="6" height="120" rx="3" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="820" y="-85" width="6" height="170" rx="3" fill="url(#waveGrad)" opacity="0.65"/>
    <rect x="840" y="-105" width="6" height="210" rx="3" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="860" y="-90" width="6" height="180" rx="3" fill="url(#waveGrad)" opacity="0.65"/>
    <rect x="880" y="-70" width="6" height="140" rx="3" fill="url(#waveGrad)" opacity="0.55"/>
    <rect x="900" y="-50" width="6" height="100" rx="3" fill="url(#waveGrad)" opacity="0.45"/>
    <rect x="920" y="-35" width="6" height="70" rx="3" fill="url(#waveGrad)" opacity="0.35"/>
    <rect x="940" y="-55" width="6" height="110" rx="3" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="960" y="-75" width="6" height="150" rx="3" fill="url(#waveGrad)" opacity="0.6"/>
    <rect x="980" y="-60" width="6" height="120" rx="3" fill="url(#waveGrad)" opacity="0.5"/>
    <rect x="1000" y="-45" width="6" height="90" rx="3" fill="url(#waveGrad)" opacity="0.4"/>
    <rect x="1020" y="-30" width="6" height="60" rx="3" fill="url(#waveGrad)" opacity="0.3"/>
    <rect x="1040" y="-20" width="6" height="40" rx="3" fill="url(#waveGrad)" opacity="0.25"/>
    <rect x="1060" y="-15" width="6" height="30" rx="3" fill="url(#waveGrad)" opacity="0.2"/>
  </g>

  <!-- Three tool badges -->
  <!-- ElevenLabs -->
  <g transform="translate(250, 530)">
    <rect x="0" y="0" width="200" height="45" rx="22" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.3)" stroke-width="1.5"/>
    <circle cx="30" cy="22" r="12" fill="#f97316" opacity="0.8"/>
    <text x="30" y="27" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">E</text>
    <text x="110" y="28" text-anchor="middle" fill="#f97316" font-family="Arial, sans-serif" font-size="15" font-weight="bold">ElevenLabs</text>
  </g>

  <!-- Suno -->
  <g transform="translate(500, 530)">
    <rect x="0" y="0" width="200" height="45" rx="22" fill="rgba(244,114,182,0.1)" stroke="rgba(244,114,182,0.3)" stroke-width="1.5"/>
    <circle cx="30" cy="22" r="12" fill="#f472b6" opacity="0.8"/>
    <text x="30" y="27" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">S</text>
    <text x="110" y="28" text-anchor="middle" fill="#f472b6" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Suno</text>
  </g>

  <!-- Udio -->
  <g transform="translate(750, 530)">
    <rect x="0" y="0" width="200" height="45" rx="22" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
    <circle cx="30" cy="22" r="12" fill="#3b82f6" opacity="0.8"/>
    <text x="30" y="27" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">U</text>
    <text x="110" y="28" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Udio</text>
  </g>

  <!-- Top title -->
  <text x="600" y="45" text-anchor="middle" fill="url(#textGrad)" font-family="Arial, sans-serif" font-size="18" font-weight="300" letter-spacing="6">AUDIO & VOZ CON IA</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="615" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="2">IA TOOLS</text>
  <text x="600" y="615" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="12">Análisis • Comparativas • Tutoriales</text>
  <text x="1140" y="615" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="13" font-weight="500">2026</text>
</svg>
