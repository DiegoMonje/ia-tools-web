<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Automation nodes -->
  <circle cx="150" cy="120" r="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="400" cy="120" r="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="650" cy="120" r="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="275" cy="280" r="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="525" cy="280" r="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Connection lines -->
  <line x1="185" y1="120" x2="240" y2="280" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="240" y1="280" x2="365" y2="120" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="435" y1="120" x2="490" y2="280" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="490" y1="280" x2="615" y2="120" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="365" y1="120" x2="615" y2="120" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Node icons -->
  <text x="150" y="128" text-anchor="middle" fill="white" font-size="20">&#9993;</text>
  <text x="400" y="128" text-anchor="middle" fill="white" font-size="20">&#128200;</text>
  <text x="650" y="128" text-anchor="middle" fill="white" font-size="20">&#127912;</text>
  <text x="275" y="288" text-anchor="middle" fill="white" font-size="20">&#129302;</text>
  <text x="525" y="288" text-anchor="middle" fill="white" font-size="20">&#128222;</text>
  <!-- Labels -->
  <text x="150" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">EMAIL</text>
  <text x="400" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">ANALYTICS</text>
  <text x="650" y="180" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">SOCIAL</text>
  <text x="275" y="340" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">IA</text>
  <text x="525" y="340" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">CRM</text>
</svg>
