<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="copilotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <linearGradient id="cursorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#c17f59"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="codeGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Background glow -->
  <circle cx="600" cy="300" r="400" fill="rgba(88,166,255,0.03)" filter="url(#blur1)"/>
  <circle cx="300" cy="200" r="200" fill="rgba(79,172,254,0.04)" filter="url(#blur1)"/>
  <circle cx="900" cy="400" r="200" fill="rgba(212,165,116,0.03)" filter="url(#blur1)"/>

  <!-- Code editor background -->
  <rect x="100" y="60" width="1000" height="440" rx="16" fill="rgba(22,27,34,0.8)" stroke="rgba(48,54,61,0.8)" stroke-width="1.5"/>
  
  <!-- Editor title bar -->
  <rect x="100" y="60" width="1000" height="36" rx="16" fill="rgba(33,38,45,0.9)"/>
  <rect x="100" y="78" width="1000" height="18" fill="rgba(33,38,45,0.9)"/>
  <circle cx="125" cy="78" r="6" fill="#ff5f56"/>
  <circle cx="145" cy="78" r="6" fill="#ffbd2e"/>
  <circle cx="165" cy="78" r="6" fill="#27ca3f"/>
  <text x="600" y="83" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="12">main.tsx — AI Coding Assistant</text>

  <!-- Code content - Left column -->
  <g font-family="monospace" font-size="14" filter="url(#codeGlow)">
    <!-- Line numbers -->
    <text x="130" y="120" fill="rgba(255,255,255,0.15)">1</text>
    <text x="130" y="145" fill="rgba(255,255,255,0.15)">2</text>
    <text x="130" y="170" fill="rgba(255,255,255,0.15)">3</text>
    <text x="130" y="195" fill="rgba(255,255,255,0.15)">4</text>
    <text x="130" y="220" fill="rgba(255,255,255,0.15)">5</text>
    <text x="130" y="245" fill="rgba(255,255,255,0.15)">6</text>
    <text x="130" y="270" fill="rgba(255,255,255,0.15)">7</text>
    <text x="130" y="295" fill="rgba(255,255,255,0.15)">8</text>
    <text x="130" y="320" fill="rgba(255,255,255,0.15)">9</text>
    <text x="130" y="345" fill="rgba(255,255,255,0.15)">10</text>

    <!-- Code lines with syntax highlighting -->
    <text x="165" y="120"><tspan fill="#ff7b72">import</tspan><tspan fill="#c9d1d9"> { useState, useEffect } </tspan><tspan fill="#ff7b72">from</tspan><tspan fill="#a5d6ff"> 'react'</tspan><tspan fill="#c9d1d9">;</tspan></text>
    <text x="165" y="145"><tspan fill="#ff7b72">import</tspan><tspan fill="#c9d1d9"> { AIAssistant } </tspan><tspan fill="#ff7b72">from</tspan><tspan fill="#a5d6ff"> './ai-tools'</tspan><tspan fill="#c9d1d9">;</tspan></text>
    <text x="165" y="170" fill="rgba(255,255,255,0.3)"> </text>
    <text x="165" y="195"><tspan fill="#ff7b72">export const</tspan><tspan fill="#d2a8ff"> App</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#79c0ff">React.FC</tspan><tspan fill="#c9d1d9"> = () =&gt; {</tspan></text>
    <text x="165" y="220"><tspan fill="#79c0ff">  const</tspan><tspan fill="#c9d1d9"> [code, setCode] = </tspan><tspan fill="#79c0ff">useState</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#a5d6ff">''</tspan><tspan fill="#c9d1d9">);</tspan></text>
    <text x="165" y="245"><tspan fill="#79c0ff">  const</tspan><tspan fill="#c9d1d9"> assistant = </tspan><tspan fill="#79c0ff">new</tspan><tspan fill="#d2a8ff"> AIAssistant</tspan><tspan fill="#c9d1d9">();</tspan></text>
    <text x="165" y="270" fill="rgba(255,255,255,0.3)"></text>
    <text x="165" y="295"><tspan fill="#8b949e">  // AI generates the implementation</tspan></text>
    <text x="165" y="320"><tspan fill="#79c0ff">  const</tspan><tspan fill="#c9d1d9"> result = </tspan><tspan fill="#79c0ff">await</tspan><tspan fill="#c9d1d9"> assistant.</tspan><tspan fill="#d2a8ff">generate</tspan><tspan fill="#c9d1d9">(code);</tspan></text>
    <text x="165" y="345"><tspan fill="#79c0ff">  return</tspan><tspan fill="#c9d1d9"> &lt;</tspan><tspan fill="#7ee787">Result</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#79c0ff">data</tspan><tspan fill="#c9d1d9">={result} /&gt;;</tspan></text>
  </g>

  <!-- AI suggestion overlay (ghost text) -->
  <rect x="165" y="355" width="500" height="22" rx="4" fill="rgba(88,166,255,0.06)"/>
  <text x="165" y="370" font-family="monospace" font-size="14" fill="rgba(88,166,255,0.35)">  // Try: const optimized = assistant.optimize(result);</text>

  <!-- Three tool badges at bottom -->
  <!-- Copilot badge -->
  <g transform="translate(250, 540)">
    <rect x="0" y="0" width="220" height="50" rx="25" fill="rgba(88,166,255,0.1)" stroke="rgba(88,166,255,0.3)" stroke-width="1.5"/>
    <text x="110" y="31" text-anchor="middle" fill="#58a6ff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">GitHub Copilot X</text>
  </g>

  <!-- Cursor badge -->
  <g transform="translate(490, 540)">
    <rect x="0" y="0" width="220" height="50" rx="25" fill="rgba(79,172,254,0.1)" stroke="rgba(79,172,254,0.3)" stroke-width="1.5"/>
    <text x="110" y="31" text-anchor="middle" fill="#4facfe" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Cursor IDE</text>
  </g>

  <!-- Claude Code badge -->
  <g transform="translate(730, 540)">
    <rect x="0" y="0" width="220" height="50" rx="25" fill="rgba(212,165,116,0.1)" stroke="rgba(212,165,116,0.3)" stroke-width="1.5"/>
    <text x="110" y="31" text-anchor="middle" fill="#d4a574" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Claude Code</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="595" width="1200" height="35" fill="rgba(0,0,0,0.3)"/>
  <text x="60" y="618" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="2">IA TOOLS</text>
  <text x="600" y="618" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="12">Análisis • Comparativas • Tutoriales</text>
  <text x="1140" y="618" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="13" font-weight="500">2026</text>
</svg>
