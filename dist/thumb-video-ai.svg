<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Video screen -->
  <rect x="150" y="50" width="500" height="260" rx="20" fill="rgba(0,0,0,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Play button -->
  <circle cx="400" cy="180" r="50" fill="rgba(255,255,255,0.2)"/>
  <polygon points="390,155 390,205 430,180" fill="white"/>
  <!-- Timeline -->
  <rect x="180" y="270" width="440" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="180" y="270" width="200" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="380" cy="274" r="8" fill="white"/>
  <!-- Video thumbnails row -->
  <rect x="180" y="295" width="80" height="20" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="270" y="295" width="80" height="20" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="360" y="295" width="80" height="20" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="450" y="295" width="80" height="20" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Labels -->
  <text x="250" y="360" text-anchor="middle" fill="rgba(0,0,0,0.7)" font-family="Arial" font-size="16" font-weight="bold">SORA</text>
  <text x="400" y="360" text-anchor="middle" fill="rgba(0,0,0,0.5)" font-family="Arial" font-size="16">VS</text>
  <text x="550" y="360" text-anchor="middle" fill="rgba(0,0,0,0.7)" font-family="Arial" font-size="16" font-weight="bold">RUNWAY</text>
</svg>
